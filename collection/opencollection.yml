opencollection: 1.0.0

info:
  name: fnaf-api
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: ""
      value: ""
bundled: false
extensions:
  bruno:
    ignore:
      - target
      - node_modules
      - .git
    presets:
      request:
        type: http
        url: "{{base_url}}"
